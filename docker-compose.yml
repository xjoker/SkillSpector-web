services:
  skillspector-adapter:
    image: ghcr.io/xjoker/skillspector-adapter:20260709.1
    container_name: skillspector-adapter
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - ${SKILLSPECTOR_ENV_FILE:-.env}
    command: ["web", "--port", "8477", "--max-upload-mb", "${SKILLSPECTOR_WEB_MAX_UPLOAD_MB:-50}"]
    ports:
      - "127.0.0.1:18477:8477"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8477/health', timeout=3)); assert data['ok'] is True; assert data['release_version']",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
